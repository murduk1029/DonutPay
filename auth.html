<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DonutPay — Вхід та реєстрація</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="auth">
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="donut deco-1" aria-hidden="true"></div>

    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html">DonutPay</a>
        <nav class="topbar-actions">
          <button id="languageToggleBtn" class="btn btn-ghost" type="button">UA</button>
          <a class="btn btn-ghost" href="index.html">На головну</a>
        </nav>
      </div>
    </header>

    <main class="container auth-layout">
      <section class="glass auth-panel">
        <aside class="auth-info">
          <p class="badge">Ласкаво просимо 🍩</p>
          <h1>DonutPay</h1>
          <p class="muted">
            Створіть акаунт, отримайте персональне посилання та почніть збирати
            донати вже сьогодні.
          </p>
          <ul class="auth-list">
            <li>🎯 Вбудовані цілі збору</li>
            <li>🚨 Анімовані алерти</li>
            <li>📈 Зручна аналітика</li>
          </ul>
        </aside>

        <div class="auth-card">
          <div class="tabs">
            <button id="loginTabBtn" class="tab active" type="button">Вхід</button>
            <button id="registerTabBtn" class="tab" type="button">Реєстрація</button>
          </div>

          <form id="loginForm" class="form">
            <h2>Увійти в DonutPay</h2>
            <label>
              Нікнейм
              <input id="loginNickname" type="text" placeholder="Введіть нікнейм" required />
            </label>
            <label>
              Пароль
              <input id="loginPassword" type="password" placeholder="Введіть пароль" required />
            </label>
            <button class="btn btn-gradient btn-lg" type="submit">Увійти</button>
          </form>

          <form id="registerForm" class="form hidden">
            <h2>Створити акаунт</h2>
            <label>
              Нікнейм
              <input id="registerNickname" type="text" placeholder="Унікальний нікнейм" required />
            </label>
            <label>
              Пароль
              <input
                id="registerPassword"
                type="password"
                placeholder="Мінімум 6 символів"
                minlength="6"
                required
              />
            </label>
            <button class="btn btn-gradient btn-lg" type="submit">Зареєструватися</button>
          </form>

          <p id="authStatus" class="status-text" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
